<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 760" width="400" height="760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Phone frame -->
  <rect x="0" y="0" width="400" height="760" rx="32" fill="#202124"/>
  <rect x="8" y="8" width="384" height="744" rx="26" fill="#f5f7fa"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="384" height="28" fill="#f5f7fa"/>
  <text x="24" y="26" font-size="12" font-weight="600" fill="#202124">9:41</text>
  <circle cx="370" cy="22" r="4" fill="#202124"/>
  <rect x="350" y="18" width="14" height="8" rx="1" fill="none" stroke="#202124" stroke-width="1"/>
  <rect x="352" y="20" width="9" height="4" fill="#202124"/>

  <!-- Bank app top bar (generic green) -->
  <rect x="8" y="36" width="384" height="56" fill="#1a7f5a"/>
  <text x="24" y="72" font-size="22" font-weight="500" fill="#ffffff">←</text>
