  <!-- Account header -->
  <rect x="8" y="92" width="384" height="80" fill="#ffffff"/>
  <text x="24" y="120" font-size="14" fill="#5f6368">Checking · ••••4821</text>
  <text x="24" y="148" font-size="22" font-weight="700" fill="#202124">$3,247.18</text>
  <text x="24" y="166" font-size="11" fill="#5f6368">Available balance</text>

  <!-- Section label -->
  <rect x="8" y="172" width="384" height="34" fill="#f5f7fa"/>
  <text x="24" y="194" font-size="12" font-weight="600" fill="#5f6368" letter-spacing="0.5">RECENT STATEMENTS</text>

  <!-- Statement row 1 (highlighted - current target) -->
  <rect x="8" y="206" width="384" height="92" fill="#ffffff"/>
  <rect x="8" y="206" width="4" height="92" fill="#1a7f5a"/>
  <rect x="24" y="222" width="44" height="56" rx="6" fill="#fce8e8"/>
  <text x="38" y="248" font-size="11" font-weight="700" fill="#c5302d">PDF</text>
  <text x="32" y="266" font-size="9" fill="#c5302d">2.1 MB</text>
  <text x="84" y="240" font-size="15" font-weight="600" fill="#202124">April 2026 Statement</text>
  <text x="84" y="262" font-size="13" fill="#5f6368">Mar 25 – Apr 24, 2026</text>
  <text x="84" y="282" font-size="12" fill="#5f6368">31 transactions · $3,247.18</text>
  <!-- Share icon (right side) -->
  <g transform="translate(338, 240)">
    <circle cx="14" cy="14" r="22" fill="#e6f3ec"/>
    <!-- Share arrow icon -->
    <path d="M14 4 L14 22 M14 4 L8 10 M14 4 L20 10 M4 16 L4 24 L24 24 L24 16" stroke="#1a7f5a" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="338" y="288" font-size="10" font-weight="500" fill="#1a7f5a" text-anchor="middle">Share</text>

  <!-- Statement row 2 -->
  <rect x="8" y="298" width="384" height="76" fill="#ffffff"/>
  <line x1="24" y1="298" x2="376" y2="298" stroke="#e8eaed"/>
  <rect x="24" y="314" width="44" height="44" rx="6" fill="#fce8e8"/>
  <text x="38" y="340" font-size="11" font-weight="700" fill="#c5302d">PDF</text>
  <text x="84" y="332" font-size="14" font-weight="500" fill="#202124">March 2026 Statement</text>
  <text x="84" y="352" font-size="12" fill="#5f6368">Feb 25 – Mar 24, 2026</text>

  <!-- Statement row 3 -->
  <rect x="8" y="374" width="384" height="76" fill="#ffffff"/>
  <line x1="24" y1="374" x2="376" y2="374" stroke="#e8eaed"/>
  <rect x="24" y="390" width="44" height="44" rx="6" fill="#fce8e8"/>
  <text x="38" y="416" font-size="11" font-weight="700" fill="#c5302d">PDF</text>
  <text x="84" y="408" font-size="14" font-weight="500" fill="#202124">February 2026 Statement</text>
  <text x="84" y="428" font-size="12" fill="#5f6368">Jan 25 – Feb 24, 2026</text>

  <!-- Statement row 4 -->
  <rect x="8" y="450" width="384" height="76" fill="#ffffff"/>
  <line x1="24" y1="450" x2="376" y2="450" stroke="#e8eaed"/>
  <rect x="24" y="466" width="44" height="44" rx="6" fill="#fce8e8"/>
  <text x="38" y="492" font-size="11" font-weight="700" fill="#c5302d">PDF</text>
  <text x="84" y="484" font-size="14" font-weight="500" fill="#202124">January 2026 Statement</text>
  <text x="84" y="504" font-size="12" fill="#5f6368">Dec 25 – Jan 24, 2026</text>

  <!-- Hint footer -->
  <rect x="8" y="700" width="384" height="52" fill="#eef5f1"/>
  <text x="200" y="724" font-size="12" font-weight="500" fill="#1a7f5a" text-anchor="middle">Tap Share to send to another app</text>
  <text x="200" y="742" font-size="10" fill="#5f6368" text-anchor="middle">Available on most banking apps</text>
</svg>
