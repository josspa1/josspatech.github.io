<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 760" width="400" height="760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Phone frame -->
  <rect x="0" y="0" width="400" height="760" rx="32" fill="#202124"/>
  <rect x="8" y="8" width="384" height="744" rx="26" fill="#ffffff"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="384" height="28" fill="#ffffff"/>
  <text x="24" y="26" font-size="12" font-weight="600" fill="#202124">9:41</text>
  <circle cx="370" cy="22" r="4" fill="#202124"/>
  <rect x="350" y="18" width="14" height="8" rx="1" fill="none" stroke="#202124" stroke-width="1"/>
  <rect x="352" y="20" width="9" height="4" fill="#202124"/>

  <!-- Gmail top bar -->
  <rect x="8" y="36" width="384" height="48" fill="#ffffff"/>
  <text x="24" y="66" font-size="22" fill="#5f6368">←</text>
  <text x="320" y="66" font-size="20" fill="#5f6368">⋮</text>
  <text x="288" y="66" font-size="18" fill="#5f6368">↻</text>
  <text x="256" y="66" font-size="18" fill="#5f6368">🗑</text>

  <!-- Email subject -->
  <text x="24" y="110" font-size="17" font-weight="600" fill="#202124">Your Riverside Hardware receipt</text>
  <text x="320" y="110" font-size="14" fill="#5f6368">★</text>

  <!-- Sender row -->
  <circle cx="40" cy="150" r="18" fill="#1e8e3e"/>
  <text x="40" y="155" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">R</text>
  <text x="72" y="144" font-size="13" font-weight="600" fill="#202124">Riverside Hardware</text>
  <text x="72" y="160" font-size="12" fill="#5f6368">to me</text>
  <text x="370" y="144" font-size="11" fill="#5f6368" text-anchor="end">9:18 AM</text>

  <!-- Email body preview -->
  <text x="24" y="200" font-size="12" fill="#202124">Hi Sam,</text>
  <text x="24" y="220" font-size="12" fill="#202124">Thanks for shopping at Riverside Hardware</text>
  <text x="24" y="238" font-size="12" fill="#202124">today. Your receipt for order #R-8842 is</text>
  <text x="24" y="256" font-size="12" fill="#202124">attached as a PDF for your records.</text>

  <text x="24" y="286" font-size="12" font-weight="600" fill="#202124">Order total: $47.32</text>
  <text x="24" y="304" font-size="12" fill="#5f6368">Paid with Visa ending in 0419</text>

  <text x="24" y="332" font-size="12" fill="#202124">Questions? Reply to this email or visit</text>
  <text x="24" y="350" font-size="12" fill="#1a73e8">riversidehardware.com/support</text>

  <text x="24" y="380" font-size="12" fill="#5f6368">— The Riverside Team</text>

  <!-- Spacer / dots indicating scroll -->
  <text x="200" y="420" font-size="20" fill="#bdc1c6" text-anchor="middle">⋮</text>
  <text x="200" y="438" font-size="11" fill="#9aa0a6" text-anchor="middle">scroll to bottom</text>
  <text x="200" y="456" font-size="20" fill="#bdc1c6" text-anchor="middle">⋮</text>

  <!-- Attachment label -->
  <text x="24" y="498" font-size="11" font-weight="600" fill="#5f6368">1 ATTACHMENT</text>

  <!-- PDF attachment card -->
  <rect x="24" y="512" width="352" height="84" rx="8" fill="#f1f3f4" stroke="#dadce0" stroke-width="1"/>

  <!-- PDF icon -->
  <rect x="40" y="530" width="40" height="48" rx="3" fill="#ea4335"/>
  <text x="60" y="560" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">PDF</text>

  <!-- File info -->
  <text x="92" y="542" font-size="13" font-weight="600" fill="#202124">Receipt-R8842.pdf</text>
  <text x="92" y="560" font-size="11" fill="#5f6368">142 KB</text>
  <text x="92" y="576" font-size="11" fill="#5f6368">Tap to preview</text>

  <!-- Download arrow with highlight -->
  <circle cx="348" cy="554" r="22" fill="none" stroke="#fbbc04" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="348" cy="554" r="16" fill="#ffffff" stroke="#1a73e8" stroke-width="1.5"/>
  <!-- Arrow icon -->
  <line x1="348" y1="546" x2="348" y2="560" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <polyline points="342,556 348,562 354,556" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="340" y1="566" x2="356" y2="566" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>

  <!-- Callout label -->
  <rect x="214" y="604" width="162" height="32" rx="6" fill="#202124"/>
  <polygon points="346,604 352,596 358,604" fill="#202124"/>
  <text x="295" y="624" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Tap the download arrow</text>

  <!-- Step instructions -->
  <rect x="24" y="652" width="352" height="88" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1"/>
  <text x="40" y="674" font-size="12" font-weight="700" fill="#1a73e8">Then in PocketBudJet:</text>
  <text x="40" y="696" font-size="11" fill="#202124"><tspan font-weight="700">1.</tspan> The PDF saves to your Downloads folder.</text>
  <text x="40" y="714" font-size="11" fill="#202124"><tspan font-weight="700">2.</tspan> Open PBJ → tap <tspan font-weight="700">Import receipts</tspan>.</text>
  <text x="40" y="732" font-size="11" fill="#202124"><tspan font-weight="700">3.</tspan> PBJ finds new files and creates a draft transaction.</text>
</svg>
